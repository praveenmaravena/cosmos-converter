version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: cosmos_postgres
    environment:
      POSTGRES_USER: cosmos
      POSTGRES_PASSWORD: cosmos123
      POSTGRES_DB: cosmos_convert
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cosmos -d cosmos_convert"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cosmos_redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cosmos_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/workspace
      - ./storage:/workspace/storage
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://cosmos:cosmos123@db:5432/cosmos_convert
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_DIR=/workspace/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cosmos_celery_worker
    command: celery -A app.celery_app worker --loglevel=info
    volumes:
      - ./backend:/workspace
      - ./storage:/workspace/storage
    environment:
      - DATABASE_URL=postgresql://cosmos:cosmos123@db:5432/cosmos_convert
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_DIR=/workspace/storage
    depends_on:
      - redis
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cosmos_frontend
    command: npm run dev -- -H 0.0.0.0
    volumes:
      - ./frontend:/workspace
      - /workspace/node_modules
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      - backend

volumes:
  postgres_data:
